<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Dashboard (Microsoft 365)</title>
<script type="text/javascript" src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
<style>
  :root {
    --surface-1:      #fcfcfb;
    --page:           #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --baseline:       #c3c2b7;
    --border:         rgba(11,11,11,0.10);
    --series-blue:    #2a78d6;
    --series-blue-bg: #e8f0fb;
    --good:           #0ca30c;
    --good-bg:        #e5f6e5;
    --warning:        #fab219;
    --warning-bg:     #fef3dc;
    --critical:       #d03b3b;
    --critical-bg:    #fbe6e6;
    --shadow: 0 1px 2px rgba(11,11,11,0.06), 0 4px 12px rgba(11,11,11,0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-1:      #1a1a19; --page: #0d0d0d; --text-primary:#ffffff; --text-secondary:#c3c2b7; --text-muted:#898781;
      --gridline:#2c2c2a; --baseline:#383835; --border:rgba(255,255,255,0.10);
      --series-blue:#3987e5; --series-blue-bg:#16283f; --good:#0ca30c; --good-bg:#103410;
      --warning:#fab219; --warning-bg:#3a2c0c; --critical:#e66767; --critical-bg:#3a1414;
      --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.3);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--page); color:var(--text-primary); font-family: system-ui,-apple-system,"Segoe UI",sans-serif; -webkit-font-smoothing:antialiased; }
  .app { max-width: 980px; margin: 0 auto; padding: 28px 20px 80px; }
  header { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:16px; flex-wrap:wrap; }
  header h1 { font-size:22px; margin:0 0 4px; letter-spacing:-0.01em; }
  header p.sub { margin:0; color:var(--text-secondary); font-size:13.5px; }
  .header-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

  button { font-family:inherit; font-size:13.5px; cursor:pointer; border-radius:8px; border:1px solid var(--border); background:var(--surface-1); color:var(--text-primary); padding:8px 13px; transition:background .12s,border-color .12s; }
  button:hover { background:var(--gridline); }
  button.primary { background:var(--series-blue); border-color:var(--series-blue); color:#fff; }
  button.primary:hover { filter:brightness(1.08); }
  button.ghost { background:transparent; border-color:transparent; padding:6px 8px; }
  button.ghost:hover { background:var(--gridline); }
  button.danger:hover { background:var(--critical-bg); border-color:var(--critical); color:var(--critical); }
  button:disabled { opacity:.45; cursor:not-allowed; }
  button:disabled:hover { background:var(--surface-1); }

  .conn-banner { border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:18px; display:flex; align-items:center; gap:12px; font-size:13.5px; background:var(--surface-1); box-shadow:var(--shadow); flex-wrap:wrap; }
  .conn-banner.warn { border-color:var(--warning); background:var(--warning-bg); }
  .conn-banner.err { border-color:var(--critical); background:var(--critical-bg); color:var(--critical); }
  .conn-banner.ok { border-color:var(--good); }
  .conn-banner .dot { width:8px; height:8px; border-radius:50%; background:var(--text-muted); flex-shrink:0; }
  .conn-banner.ok .dot { background:var(--good); }
  .conn-banner .msg { flex:1; min-width:200px; }
  .conn-banner code { background:var(--gridline); padding:1px 5px; border-radius:4px; font-size:12px; }

  .stats { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:20px; }
  .stat-tile { background:var(--surface-1); border:1px solid var(--border); border-radius:10px; padding:14px 14px 12px; box-shadow:var(--shadow); }
  .stat-tile .label { font-size:12px; color:var(--text-secondary); margin-bottom:6px; }
  .stat-tile .value { font-size:26px; font-weight:600; line-height:1; }
  .stat-tile.overdue .value { color:var(--critical); }
  .stat-tile.done .value { color:var(--good); }
  @media (max-width:720px) { .stats { grid-template-columns:repeat(2,1fr); } }

  .toolbar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:var(--surface-1); border:1px solid var(--border); border-radius:10px; padding:10px; margin-bottom:22px; box-shadow:var(--shadow); }
  .toolbar input[type="text"], .toolbar select { font-family:inherit; font-size:13.5px; padding:7px 10px; border-radius:7px; border:1px solid var(--border); background:var(--page); color:var(--text-primary); }
  .toolbar input[type="text"] { flex:1 1 160px; min-width:140px; }
  .toolbar .divider { width:1px; align-self:stretch; background:var(--border); margin:0 2px; }

  .project-group { margin-bottom:22px; }
  .project-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .project-header h2 { font-size:15px; margin:0; font-weight:600; }
  .project-header .count { font-size:12px; color:var(--text-muted); }
  .meter { flex:1; max-width:160px; height:6px; background:var(--gridline); border-radius:4px; overflow:hidden; }
  .meter-fill { height:100%; background:var(--series-blue); border-radius:4px; transition:width .25s; }
  .meter-pct { font-size:12px; color:var(--text-secondary); min-width:32px; text-align:right; }

  .task-list { background:var(--surface-1); border:1px solid var(--border); border-radius:10px; overflow:hidden; box-shadow:var(--shadow); }
  .task-row { display:flex; align-items:flex-start; gap:10px; padding:11px 13px; border-bottom:1px solid var(--gridline); }
  .task-row:last-child { border-bottom:none; }
  .task-row:hover { background:var(--page); }
  .task-row .row-actions { margin-left:auto; display:flex; gap:2px; opacity:0; transition:opacity .1s; flex-shrink:0; }
  .task-row:hover .row-actions { opacity:1; }

  .status-toggle { width:20px; height:20px; border-radius:6px; border:1.5px solid var(--baseline); background:var(--surface-1); flex-shrink:0; cursor:pointer; margin-top:1px; display:flex; align-items:center; justify-content:center; padding:0; }
  .status-toggle.in-progress { border-color:var(--series-blue); background:var(--series-blue-bg); }
  .status-toggle.in-progress::after { content:""; width:8px; height:8px; border-radius:2px; background:var(--series-blue); }
  .status-toggle.done { border-color:var(--good); background:var(--good); }
  .status-toggle.done::after { content:"✓"; color:#fff; font-size:13px; line-height:1; font-weight:700; }

  .task-main { flex:1; min-width:0; }
  .task-title-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .task-title { font-size:14px; font-weight:500; }
  .task-row.is-done .task-title { text-decoration:line-through; color:var(--text-muted); }

  .badge { display:inline-flex; align-items:center; gap:4px; font-size:11.5px; font-weight:600; padding:2px 7px; border-radius:999px; white-space:nowrap; }
  .badge .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .badge.priority-high { background:var(--critical-bg); color:var(--critical); }
  .badge.priority-high .dot { background:var(--critical); }
  .badge.priority-medium { background:var(--warning-bg); color:#8a5a00; }
  .badge.priority-medium .dot { background:var(--warning); }
  .badge.priority-low { background:var(--good-bg); color:var(--good); }
  .badge.priority-low .dot { background:var(--good); }
  @media (prefers-color-scheme: dark) { .badge.priority-medium { color:var(--warning); } }

  .badge.email-link { background:var(--series-blue-bg); color:var(--series-blue); cursor:pointer; text-decoration:none; }

  .chip-deadline { font-size:11.5px; color:var(--text-muted); display:inline-flex; align-items:center; gap:4px; }
  .chip-deadline.overdue { color:var(--critical); font-weight:600; }
  .chip-deadline.due-soon { color:#8a5a00; font-weight:600; }
  @media (prefers-color-scheme: dark) { .chip-deadline.due-soon { color:var(--warning); } }

  .task-notes-toggle { font-size:11.5px; color:var(--series-blue); cursor:pointer; background:none; border:none; padding:0; margin-top:3px; font-family:inherit; }
  .task-notes { font-size:13px; color:var(--text-secondary); margin-top:6px; white-space:pre-wrap; max-width:640px; display:none; }
  .task-notes.open { display:block; }

  .empty-state { text-align:center; padding:50px 20px; color:var(--text-muted); font-size:13.5px; }
  .empty-state strong { display:block; color:var(--text-secondary); font-size:15px; margin-bottom:6px; }

  .modal-overlay { position:fixed; inset:0; background:rgba(11,11,11,.45); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50; }
  .modal-overlay.hidden { display:none; }
  .modal { background:var(--surface-1); border-radius:12px; padding:22px; width:100%; max-width:440px; box-shadow:0 20px 60px rgba(0,0,0,.3); max-height:90vh; overflow-y:auto; }
  .modal h3 { margin:0 0 16px; font-size:16px; }
  .field { margin-bottom:13px; }
  .field label { display:block; font-size:12.5px; color:var(--text-secondary); margin-bottom:5px; font-weight:500; }
  .field input[type="text"], .field input[type="date"], .field select, .field textarea { width:100%; font-family:inherit; font-size:14px; padding:8px 10px; border-radius:7px; border:1px solid var(--border); background:var(--page); color:var(--text-primary); }
  .field textarea { resize:vertical; min-height:60px; }
  .field-row { display:flex; gap:10px; }
  .field-row .field { flex:1; }
  .modal-actions { display:flex; justify-content:space-between; align-items:center; margin-top:18px; gap:8px; }
  .modal-actions .right { display:flex; gap:8px; margin-left:auto; }

  .toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(0); background:var(--text-primary); color:var(--page); padding:10px 16px; border-radius:8px; font-size:13px; display:flex; align-items:center; gap:12px; box-shadow:var(--shadow); opacity:0; pointer-events:none; transition:opacity .2s,transform .2s; z-index:60; max-width:80vw; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(-6px); pointer-events:auto; }

  footer.hint { text-align:center; color:var(--text-muted); font-size:12px; margin-top:30px; }
  .spinner { display:inline-block; width:12px; height:12px; border:2px solid var(--border); border-top-color:var(--series-blue); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="app">

  <!-- ======================================================================
       SETUP: replace these two values after you register the Azure AD app.
       See SETUP-GUIDE.md, step 1, for exactly where to find them.
  ======================================================================= -->
  <script>
    window.DASHBOARD_CONFIG = {
      CLIENT_ID: "YOUR_CLIENT_ID_HERE",       // Application (client) ID from Azure
      TENANT_ID: "YOUR_TENANT_ID_HERE",       // Directory (tenant) ID from Azure
      FILE_PATH: "TasksDashboard/tasks.xlsx", // where the task file lives in your OneDrive
      TABLE_NAME: "Tasks"
    };
  </script>

  <header>
    <div>
      <h1>Work Dashboard</h1>
      <p class="sub">Synced to OneDrive — every project, priority, and deadline in one place.</p>
    </div>
    <div class="header-actions" id="header-actions"></div>
  </header>

  <div id="conn-banner" class="conn-banner"></div>

  <section class="stats" id="stats"></section>

  <section class="toolbar">
    <input type="text" id="search" placeholder="Search tasks…">
    <select id="filter-project"><option value="all">All projects</option></select>
    <select id="filter-priority">
      <option value="all">All priorities</option>
      <option value="high">High priority</option>
      <option value="medium">Medium priority</option>
      <option value="low">Low priority</option>
    </select>
    <select id="filter-status">
      <option value="all">All statuses</option>
      <option value="todo">To do</option>
      <option value="in-progress">In progress</option>
      <option value="done">Done</option>
    </select>
    <div class="divider"></div>
    <select id="sort-by">
      <option value="deadline">Sort: deadline</option>
      <option value="priority">Sort: priority</option>
      <option value="created">Sort: recently added</option>
    </select>
  </section>

  <section id="project-groups"></section>

  <footer class="hint" id="footer-hint">Your tasks are stored in <strong>OneDrive → TasksDashboard → tasks.xlsx</strong> — open that file any time to see the raw data.</footer>
</div>

<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Add task</h3>
    <form id="task-form">
      <input type="hidden" id="f-id">
      <div class="field">
        <label for="f-title">Title</label>
        <input type="text" id="f-title" required placeholder="e.g. Finish Q3 budget review">
      </div>
      <div class="field">
        <label for="f-project">Project</label>
        <input type="text" id="f-project" list="project-suggestions" required placeholder="e.g. Marketing site relaunch">
        <datalist id="project-suggestions"></datalist>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="f-priority">Priority</label>
          <select id="f-priority">
            <option value="high">High</option>
            <option value="medium" selected>Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
        <div class="field">
          <label for="f-status">Status</label>
          <select id="f-status">
            <option value="todo">To do</option>
            <option value="in-progress">In progress</option>
            <option value="done">Done</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label for="f-deadline">Deadline (optional)</label>
        <input type="date" id="f-deadline">
      </div>
      <div class="field">
        <label for="f-notes">Notes (optional)</label>
        <textarea id="f-notes" placeholder="Context, links, next steps…"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="danger ghost" id="btn-delete" style="display:none;">Delete task</button>
        <div class="right">
          <button type="button" class="ghost" id="btn-cancel">Cancel</button>
          <button type="submit" class="primary" id="btn-save">Save task</button>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-msg"></span></div>

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
  function todayStr() { var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  var TODAY = todayStr();
  function escapeHtml(str) { return String(str).replace(/[&<>"']/g, function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }

  var PRIORITY_LABEL = { high:"High", medium:"Medium", low:"Low" };
  var STATUS_ORDER = ["todo","in-progress","done"];

    tasks: [],
    rowIndexById: {},
    filters: { project:"all", priority:"all", status:"all", search:"" },
    sortBy: "deadline",
    openNotes: {},
    connected: false,
    account: null,
    busy: false
  };

  var el = {};
  ["stats","project-groups","search","filter-project","filter-priority","filter-status","sort-by",
   "modal-overlay","modal-title","task-form","f-id","f-title","f-project","f-priority","f-status",

   "conn-banner","header-actions","toast","toast-msg"].forEach(function(id){

  });

  function showToast(msg) {
    el.toastMsg.textContent = msg;
    el.toast.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(function(){ el.toast.classList.remove("show"); }, 4500);
  }

  // ---------------- Auth ----------------
  var msalInstance = null;
  var tokenCache = null;

  function setupNotDone() {
    return !CFG.CLIENT_ID || CFG.CLIENT_ID.indexOf("YOUR_") === 0 || !CFG.TENANT_ID || CFG.TENANT_ID.indexOf("YOUR_") === 0;
  }

  function renderBanner(mode, msg) {
    el.connBanner.className = "conn-banner" + (mode ? " " + mode : "");
    el.connBanner.innerHTML = '<span class="dot"></span><span class="msg">' + msg + "</span>";
  }

  function renderHeaderActions() {
    if (state.connected) {
      el.headerActions.innerHTML =
        '<span style="font-size:12.5px;color:var(--text-secondary);">' + escapeHtml(state.account ? state.account.username : "") + '</span>' +
        '<button class="ghost" id="btn-refresh">⟳ Refresh</button>' +
        '<button class="ghost" id="btn-signout">Sign out</button>' +
        '<button class="primary" id="btn-add">+ Add task</button>';
      document.getElementById("btn-add").addEventListener("click", function(){ openModal(null); });
      document.getElementById("btn-refresh").addEventListener("click", function(){ loadTasks(true); });
      document.getElementById("btn-signout").addEventListener("click", signOut);
    } else {
      el.headerActions.innerHTML = '<button class="primary" id="btn-signin">Connect Microsoft 365</button>';
      var btn = document.getElementById("btn-signin");
      if (btn) btn.addEventListener("click", signIn);
    }
  }

  function init() {
    renderStats();
    if (setupNotDone()) {
      renderBanner("warn", "Setup needed — open this file and fill in <code>CLIENT_ID</code> and <code>TENANT_ID</code> at the top of the script, following SETUP-GUIDE.md step 1.");
      renderHeaderActions();
      return;
    }
    if (!window.msal) {
      renderBanner("err", "Couldn't load the Microsoft sign-in library (msal-browser). Check your internet connection and reload.");
      renderHeaderActions();
      return;
    }
    msalInstance = new msal.PublicClientApplication({
      auth: {
        clientId: CFG.CLIENT_ID,
        authority: "https://login.microsoftonline.com/" + CFG.TENANT_ID,
        redirectUri: window.location.origin + window.location.pathname
      },
      cache: { cacheLocation: "localStorage", storeAuthStateInCookie: false }
    });

    msalInstance.handleRedirectPromise().then(function (resp) {
      var accounts = msalInstance.getAllAccounts();
      if (accounts.length > 0) {
        state.account = accounts[0];
        state.connected = true;
        renderHeaderActions();
        loadTasks(false);
      } else {
        renderBanner("", "Not connected. Click “Connect Microsoft 365” to load your tasks from OneDrive.");
        renderHeaderActions();
      }
    }).catch(function (err) {
      renderBanner("err", "Sign-in error: " + escapeHtml(err.message || String(err)));
      renderHeaderActions();
    });
  }

  function signIn() {
    var loginReq = { scopes: ["Files.ReadWrite", "User.Read"] };
    msalInstance.loginPopup(loginReq).then(function (resp) {
      state.account = resp.account;
      state.connected = true;
      renderHeaderActions();
      loadTasks(false);
    }).catch(function (err) {
      renderBanner("err", "Sign-in failed: " + escapeHtml(err.message || String(err)) + " — if this keeps happening, send me the exact message.");
    });
  }

  function signOut() {
    state.connected = false; state.account = null; state.tasks = []; state.rowIndexById = {};
    renderHeaderActions(); render();
    renderBanner("", "Signed out. Click “Connect Microsoft 365” to reconnect.");
  }

  function getToken() {
    var req = { scopes: ["Files.ReadWrite", "User.Read"], account: state.account };
    return msalInstance.acquireTokenSilent(req).catch(function () {
      return msalInstance.acquireTokenPopup(req);
    }).then(function (resp) { return resp.accessToken; });
  }

  function graphFetch(path, opts) {
    opts = opts || {};
    return getToken().then(function (token) {
      var headers = Object.assign({ Authorization: "Bearer " + token }, opts.headers || {});
      return fetch(GRAPH + path, Object.assign({}, opts, { headers: headers }));
    });
  }

  // ---------------- Data load / provisioning ----------------
  function b64ToBytes(b64) {
    var bin = atob(b64);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  function ensureFolderExists() {
    var folderName = CFG.FILE_PATH.split("/")[0];
    return graphFetch("/me/drive/root/children", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: folderName, folder: {}, "@microsoft.graph.conflictBehavior": "fail" })
    }).then(function (r) {
      if (r.ok || r.status === 409) return true; // created, or already exists
      return r.text().then(function (t) { throw new Error("Couldn't create OneDrive folder (" + r.status + "): " + t); });
    });
  }

  function ensureFileExists() {
    return graphFetch(FILE_ITEM_PATH).then(function (r) {
      if (r.status === 200) return true;
      if (r.status === 404) {
        return ensureFolderExists().then(function () {
          var bytes = b64ToBytes(TEMPLATE_XLSX_B64);
          return graphFetch(FILE_ITEM_PATH + ":/content", {
            method: "PUT",
            headers: { "Content-Type": "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" },
            body: bytes
          }).then(function (r2) {
            if (!r2.ok) return r2.text().then(function(t){ throw new Error("Couldn't create tasks.xlsx (" + r2.status + "): " + t); });
            return true;
          });
        });
      }
      return r.text().then(function (t) { throw new Error("Couldn't reach OneDrive (" + r.status + "): " + t); });
    });
  }

  function rowsUrl(suffix) { return FILE_ITEM_PATH + ":/workbook/tables/" + CFG.TABLE_NAME + "/rows" + (suffix || ""); }

  function loadTasks(manual) {
    if (state.busy) return;
    state.busy = true;
    renderBanner("", '<span class="spinner"></span> Connecting to OneDrive…');
    ensureFileExists().then(function () {
      return graphFetch(rowsUrl());
    }).then(function (r) {
      if (!r.ok) return r.text().then(function(t){ throw new Error("Couldn't read tasks (" + r.status + "): " + t); });
      return r.json();
    }).then(function (data) {
      state.tasks = [];
      state.rowIndexById = {};
      (data.value || []).forEach(function (row, i) {
        var v = row.values[0];
        if (!v || !v[0]) return; // skip blank rows
        var task = {
          id: v[0], title: v[1] || "", project: v[2] || "", priority: v[3] || "medium",
          deadline: v[4] || "", status: v[5] || "todo", notes: v[6] || "",
          emailSubject: v[7] || "", emailLink: v[8] || "", createdAt: Number(v[9]) || Date.now()
        };
        state.rowIndexById[task.id] = row.index;
        state.tasks.push(task);
      });
      state.connected = true;
      renderBanner("ok", "Connected — synced with <code>" + escapeHtml(CFG.FILE_PATH) + "</code>" + (manual ? " (refreshed)" : ""));
      render();
    }).catch(function (err) {
      renderBanner("err", escapeHtml(err.message) + " — if this persists, send me this exact message.");
    }).finally(function () { state.busy = false; });
  }

  function withBusy(promise) {
    state.busy = true;
    return promise.finally(function () { state.busy = false; });
  }

  function addTaskRemote(task) {
    var values = [task.id, task.title, task.project, task.priority, task.deadline, task.status, task.notes, task.emailSubject||"", task.emailLink||"", String(task.createdAt)];
    return withBusy(graphFetch(rowsUrl("/add"), {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ index: null, values: [values] })
    })).then(function (r) {
      if (!r.ok) return r.text().then(function(t){ throw new Error("Couldn't save the new task (" + r.status + "): " + t); });
      return loadTasks(false);
    });
  }

  function updateTaskRemote(task) {
    var idx = state.rowIndexById[task.id];
    if (idx === undefined) return addTaskRemote(task);
    var sheetRow = idx + 2; // header is row 1, table data starts row 2
    var range = "A" + sheetRow + ":J" + sheetRow;
    var values = [task.id, task.title, task.project, task.priority, task.deadline, task.status, task.notes, task.emailSubject||"", task.emailLink||"", String(task.createdAt)];
    return withBusy(graphFetch(FILE_ITEM_PATH + ":/workbook/worksheets('" + CFG.TABLE_NAME + "')/range(address='" + range + "')", {
      method: "PATCH", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ values: [values] })
    })).then(function (r) {
      if (!r.ok) return r.text().then(function(t){ throw new Error("Couldn't update the task (" + r.status + "): " + t); });
      return loadTasks(false);
    });
  }

  function deleteTaskRemote(taskId) {
    var idx = state.rowIndexById[taskId];
    if (idx === undefined) return Promise.resolve();
    return withBusy(graphFetch(rowsUrl("/" + idx), { method: "DELETE" })).then(function (r) {
      if (!r.ok && r.status !== 204) return r.text().then(function(t){ throw new Error("Couldn't delete the task (" + r.status + "): " + t); });
      return loadTasks(false);
    });
  }

  // ---------------- Rendering (same as before) ----------------
  function deadlineUrgency(task) {
    if (!task.deadline || task.status === "done") return "none";
    if (task.deadline < TODAY) return "overdue";
    var soon = new Date(TODAY); soon.setDate(soon.getDate() + 3);
    var soonStr = soon.getFullYear()+"-"+String(soon.getMonth()+1).padStart(2,"0")+"-"+String(soon.getDate()).padStart(2,"0");
    if (task.deadline <= soonStr) return "due-soon";
    return "normal";
  }
  function formatDeadline(dateStr) { if (!dateStr) return ""; var d = new Date(dateStr+"T00:00:00"); return d.toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
  function getProjects() { var set={}; state.tasks.forEach(function(t){set[t.project]=true;}); return Object.keys(set).sort(function(a,b){return a.localeCompare(b);}); }

  function syncProjectFilterOptions() {
    var projects = getProjects(); var current = el.filterProject.value;
    el.filterProject.innerHTML = '<option value="all">All projects</option>' + projects.map(function(p){return '<option value="'+escapeHtml(p)+'">'+escapeHtml(p)+"</option>";}).join("");
    if (projects.indexOf(current) !== -1) el.filterProject.value = current;
    el.projectSuggestions.innerHTML = projects.map(function(p){return '<option value="'+escapeHtml(p)+'">';}).join("");
  }

  function filteredTasks() {
    var f = state.filters, q = f.search.trim().toLowerCase();
    return state.tasks.filter(function(t){
      if (f.project!=="all" && t.project!==f.project) return false;
      if (f.priority!=="all" && t.priority!==f.priority) return false;
      if (f.status!=="all" && t.status!==f.status) return false;
      if (q && (t.title+" "+t.notes).toLowerCase().indexOf(q)===-1) return false;
      return true;
    });
  }
  function sortTasks(tasks) {
    var arr = tasks.slice();
    if (state.sortBy==="deadline") arr.sort(function(a,b){ if(!a.deadline&&!b.deadline)return 0; if(!a.deadline)return 1; if(!b.deadline)return -1; return a.deadline<b.deadline?-1:a.deadline>b.deadline?1:0; });
    else if (state.sortBy==="priority") arr.sort(function(a,b){ return PRIORITY_ORDER[a.priority]-PRIORITY_ORDER[b.priority]; });
    else arr.sort(function(a,b){ return b.createdAt-a.createdAt; });
    return arr;
  }

  function render() { syncProjectFilterOptions(); renderStats(); renderGroups(); }

  function renderStats() {
    var total=state.tasks.length, todo=0, inProgress=0, done=0, overdue=0;
    state.tasks.forEach(function(t){ if(t.status==="todo")todo++; else if(t.status==="in-progress")inProgress++; else if(t.status==="done")done++; if(deadlineUrgency(t)==="overdue")overdue++; });
    var tiles=[{label:"Total tasks",value:total,cls:""},{label:"To do",value:todo,cls:""},{label:"In progress",value:inProgress,cls:""},{label:"Done",value:done,cls:"done"},{label:"Overdue",value:overdue,cls:"overdue"}];
    el.stats.innerHTML = tiles.map(function(t){return '<div class="stat-tile '+t.cls+'"><div class="label">'+t.label+'</div><div class="value">'+t.value+"</div></div>";}).join("");
  }

  function renderGroups() {
    if (!state.connected) { el.projectGroups.innerHTML = ""; return; }
    var tasks = filteredTasks();
    if (tasks.length===0) {
      el.projectGroups.innerHTML = '<div class="empty-state"><strong>No tasks yet</strong>Add one, or create one straight from an email in Outlook.</div>';
      return;
    }
    var byProject = {};
    tasks.forEach(function(t){ (byProject[t.project]=byProject[t.project]||[]).push(t); });
    var projectNames = Object.keys(byProject).sort(function(a,b){return a.localeCompare(b);});

    el.projectGroups.innerHTML = projectNames.map(function(project){
      var group = sortTasks(byProject[project]);
      var allInProject = state.tasks.filter(function(t){return t.project===project;});
      var doneCount = allInProject.filter(function(t){return t.status==="done";}).length;
      var pct = allInProject.length ? Math.round((doneCount/allInProject.length)*100) : 0;

      var rows = group.map(function(t){
        var urgency = deadlineUrgency(t);
        var deadlineHtml = "";
        if (t.deadline) {
          var label = urgency==="overdue" ? "Overdue "+formatDeadline(t.deadline) : urgency==="due-soon" ? "Due soon · "+formatDeadline(t.deadline) : "Due "+formatDeadline(t.deadline);
          deadlineHtml = '<span class="chip-deadline '+(urgency!=="normal"&&urgency!=="none"?urgency:"")+'">'+escapeHtml(label)+"</span>";
        }
        var emailHtml = t.emailLink ? '<a class="badge email-link" href="'+escapeHtml(t.emailLink)+'" target="_blank" rel="noopener">✉ Original email</a>' : "";
        var notesOpen = !!state.openNotes[t.id];
        var notesHtml = t.notes ? ('<button class="task-notes-toggle" data-toggle-notes="'+t.id+'">'+(notesOpen?"Hide notes":"Show notes")+'</button><div class="task-notes'+(notesOpen?" open":"")+'">'+escapeHtml(t.notes)+"</div>") : "";

        return '<div class="task-row'+(t.status==="done"?" is-done":"")+'">'+
          '<button class="status-toggle '+t.status+'" data-toggle-status="'+t.id+'" title="Click to change status"></button>'+
          '<div class="task-main"><div class="task-title-row">'+
            '<span class="task-title">'+escapeHtml(t.title)+"</span>"+
            '<span class="badge priority-'+t.priority+'"><span class="dot"></span>'+PRIORITY_LABEL[t.priority]+"</span>"+
            deadlineHtml + emailHtml +
          "</div>"+ notesHtml +"</div>"+
          '<div class="row-actions"><button class="ghost" data-edit="'+t.id+'" title="Edit">✎</button><button class="ghost danger" data-delete="'+t.id+'" title="Delete">🗑</button></div>'+
        "</div>";
      }).join("");

      return '<div class="project-group"><div class="project-header"><h2>'+escapeHtml(project)+'</h2>'+
        '<span class="count">'+allInProject.length+(allInProject.length===1?" task":" tasks")+'</span>'+
        '<div class="meter"><div class="meter-fill" style="width:'+pct+'%"></div></div>'+
        '<span class="meter-pct">'+pct+'%</span></div>'+
        '<div class="task-list">'+rows+"</div></div>";
    }).join("");
  }

  el.projectGroups.addEventListener("click", function (e) {
    var ts = e.target.closest("[data-toggle-status]");
    if (ts) { var t = state.tasks.find(function(x){return x.id===ts.getAttribute("data-toggle-status");}); if (t) { var i=STATUS_ORDER.indexOf(t.status); t.status=STATUS_ORDER[(i+1)%STATUS_ORDER.length]; render(); updateTaskRemote(t).catch(function(err){ showToast(err.message); }); } return; }
    var ed = e.target.closest("[data-edit]"); if (ed) { openModal(ed.getAttribute("data-edit")); return; }
    var del = e.target.closest("[data-delete]"); if (del) { var id = del.getAttribute("data-delete"); var t2 = state.tasks.find(function(x){return x.id===id;}); state.tasks = state.tasks.filter(function(x){return x.id!==id;}); render(); deleteTaskRemote(id).then(function(){ showToast("Task deleted"); }).catch(function(err){ showToast(err.message); if (t2) { state.tasks.push(t2); render(); } }); return; }
    var tn = e.target.closest("[data-toggle-notes]"); if (tn) { var nid = tn.getAttribute("data-toggle-notes"); state.openNotes[nid] = !state.openNotes[nid]; renderGroups(); }
  });

  function openModal(id) {
    if (id) {
      var t = state.tasks.find(function(x){return x.id===id;});
      el.modalTitle.textContent = "Edit task";
      el.fId.value=t.id; el.fTitle.value=t.title; el.fProject.value=t.project; el.fPriority.value=t.priority;
      el.fStatus.value=t.status; el.fDeadline.value=t.deadline||""; el.fNotes.value=t.notes||"";
      el.btnDelete.style.display = "inline-block";
    } else {
      el.modalTitle.textContent = "Add task"; el.taskForm.reset(); el.fId.value="";
      el.fPriority.value="medium"; el.fStatus.value="todo"; el.btnDelete.style.display="none";
    }
    el.modalOverlay.classList.remove("hidden"); el.fTitle.focus();
  }
  function closeModal() { el.modalOverlay.classList.add("hidden"); }
  el.btnCancel.addEventListener("click", closeModal);
  el.modalOverlay.addEventListener("click", function(e){ if (e.target===el.modalOverlay) closeModal(); });
  document.addEventListener("keydown", function(e){ if (e.key==="Escape") closeModal(); });
  el.btnDelete.addEventListener("click", function(){
    if (!el.fId.value) return;
    var id = el.fId.value; var t2 = state.tasks.find(function(x){return x.id===id;});
    state.tasks = state.tasks.filter(function(x){return x.id!==id;}); closeModal(); render();
    deleteTaskRemote(id).then(function(){ showToast("Task deleted"); }).catch(function(err){ showToast(err.message); if (t2){ state.tasks.push(t2); render(); } });
  });

  el.taskForm.addEventListener("submit", function (e) {
    e.preventDefault();
    var id = el.fId.value;
    var data = { title: el.fTitle.value.trim(), project: el.fProject.value.trim(), priority: el.fPriority.value, status: el.fStatus.value, deadline: el.fDeadline.value, notes: el.fNotes.value.trim() };
    if (!data.title || !data.project) return;
    if (id) {
      var t = state.tasks.find(function(x){return x.id===id;});
      Object.assign(t, data); closeModal(); render();
      updateTaskRemote(t).then(function(){ showToast("Task updated"); }).catch(function(err){ showToast(err.message); });
    } else {
      var newTask = Object.assign({ id: uid(), createdAt: Date.now(), emailSubject:"", emailLink:"" }, data);
      state.tasks.push(newTask); closeModal(); render();
      addTaskRemote(newTask).then(function(){ showToast("Task added"); }).catch(function(err){ showToast(err.message); });
    }
  });

  el.search.addEventListener("input", function(){ state.filters.search = el.search.value; renderGroups(); });
  el.filterProject.addEventListener("change", function(){ state.filters.project = el.filterProject.value; renderGroups(); });
  el.filterPriority.addEventListener("change", function(){ state.filters.priority = el.filterPriority.value; renderGroups(); });
  el.filterStatus.addEventListener("change", function(){ state.filters.status = el.filterStatus.value; renderGroups(); });
  el.sortBy.addEventListener("change", function(){ state.sortBy = el.sortBy.value; renderGroups(); });

  init();
})();
</script>
</body>
</html>
